<div class="page-wrapper" [class.nodo-mode]="isNodo()">

  <!-- Blobs decorativos fijos -->
  <div class="deco-overlay">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
  </div>

  <!-- Columna izquierda — menú hamburguesa (fijo) -->
  <aside class="nav-column">
    <div class="nav-hamburger">
      <a class="nav-btn" routerLink="/" aria-label="Inicio" (click)="menuOpen = false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" stroke="#e91e8c" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </a>
      <button class="ham-btn" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="ham-menu" [class.visible]="menuOpen">
        <a class="ham-item" routerLink="/nodo-1" (click)="menuOpen = false">Nodo 1</a>
        <a class="ham-item" routerLink="/nodo-2" (click)="menuOpen = false">Nodo 2</a>
        <a class="ham-item" routerLink="/nodo-3" (click)="menuOpen = false">Nodo 3</a>
        <a class="ham-item" routerLink="/nodo-4" (click)="menuOpen = false">Nodo 4</a>
      </div>
    </div>
  </aside>

  <!-- Header fijo (oculto en nodos) -->
  @if (!isNodo()) {
    <header class="site-header">
      <span class="site-header-text">Una investigación sobre el retorno de la prensa rosa a la televisión chilena</span>
    </header>
  }

  <!-- Contenido ruteado con animación de página -->
  <div class="main-area" [class.nodo-mode]="isNodo()">
    <router-outlet />
  </div>

</div>
